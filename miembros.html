<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miembros – Sistema de Orquestas</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .back-link {
            display: inline-block;
            margin: 1.5rem 0;
            color: var(--color-primario);
            font-weight: 600;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        .roles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .rol-card {
            background: var(--color-blanco);
            border: 2px solid #e0e4f0;
            border-radius: var(--border-radius);
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition-normal);
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .rol-card:hover {
            border-color: var(--color-primario);
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }
        .rol-card .icono {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .miembros-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .persona-card {
            background: var(--color-blanco);
            border: 1px solid #e0e4f0;
            border-radius: var(--border-radius);
            padding: 1.5rem;
            text-align: center;
            box-shadow: var(--shadow-card);
            position: relative;
            transition: var(--transition-fast);
        }
        .persona-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .avatar {
            width: 64px;
            height: 64px;
            background: var(--color-primario);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.5rem;
            margin: 0 auto 0.8rem;
        }

        .is-admin .btn-admin-accion { display: inline-flex; align-items: center; justify-content: center; }

        .btn-admin-accion {
            display: none;
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--color-acento);
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .btn-admin-accion:hover {
            background: #d40404;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <header class="barra-superior">
        <img src="datos.png" alt="Gobierno de Venezuela" style="max-height:50px;" />
        <nav id="user-nav" class="user-nav"></nav>
    </header>

    <main class="contenido-web container" id="miembros-container">
        <a class="back-link" href="panel.html">&larr; Volver al Panel</a>
        <h2 style="color: var(--color-primario); font-weight: 800;">Miembros</h2>
        <div id="miembros-vista"></div>
    </main>

    <div class="modal-overlay" id="modal-persona">
        <div class="modal-content">
            <h2 id="modal-persona-title">Agregar Persona</h2>
            <input type="hidden" id="persona-rol" />
            <div class="editor-row"><label>Nombre:</label><input type="text" id="persona-nombre" class="modal-input" /></div>
            <div class="editor-row"><label>Email:</label><input type="email" id="persona-email" class="modal-input" /></div>
            <div class="editor-row"><label>Rol:</label>
                <select id="persona-rango" class="modal-input">
                    <option value="estudiante">Estudiante</option>
                    <option value="profesor">Profesor</option>
                    <option value="admin">Administrador</option>
                    <option value="director_nucleo">Director de Núcleo</option>
                </select>
            </div>
            <div class="editor-row"><label>Agrupación:</label><input type="text" id="persona-agrupacion" class="modal-input" /></div>
            <div class="editor-row"><label>Estado:</label><input type="text" id="persona-estado" class="modal-input" /></div>
            <div class="editor-row"><label>Núcleo:</label><input type="text" id="persona-nucleo" class="modal-input" /></div>
            <button id="btn-guardar-persona" class="btn btn-submit">Guardar</button>
            <button id="btn-cerrar-modal-persona" class="btn btn-cerrar">Cancelar</button>
        </div>
    </div>

    <script type="module" src="auth.js?v=2.1"></script>
    <script type="module" src="ui-manager.js?v=2.1"></script>
    <script type="module">
        import { db, auth } from "./firebase-init.js";
        import {
          collection, query, where, getDocs, deleteDoc, doc, onSnapshot
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        function initMiembros() {
            if (!window.Auth?.getSession()) {
                window.location.href = "index.html";
                return;
            }

            const container = document.getElementById("miembros-container");
            const session = window.Auth.getSession();

            // Aplicar clase de administrador según el rango
            const rolesAdmin = ["owner_supremo", "director_nacional", "director_regional", "director_nucleo", "admin"];
            if (rolesAdmin.includes(session.role)) {
                container.classList.add("is-admin");
            }

            let vistaActual = "main";

            // Función para cargar miembros de forma optimizada
            async function cargarMiembros(rango) {
                if (!window.Auth.checkPermission("manage_users")) return [];

                // Si es owner supremo o director nacional, ve todos los usuarios
                if (["owner_supremo", "director_nacional"].includes(session.role)) {
                    const q = query(collection(db, "usuarios"), where("rango", "==", rango));
                    const snapshot = await getDocs(q);
                    return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                }

                // Para otros roles, filtra por su núcleo
                const q = query(
                    collection(db, "usuarios"),
                    where("rango", "==", rango),
                    where("nucleo", "==", session.nucleus)
                );
                const snapshot = await getDocs(q);
                return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            }

            async function eliminarMiembro(uid) {
                if (!window.Auth.checkPermission("manage_users")) {
                    alert("No tienes permiso para eliminar usuarios.");
                    return;
                }
                if (!confirm("¿Estás seguro de eliminar a este usuario?")) return;
                try {
                    await deleteDoc(doc(db, "usuarios", uid));
                    alert("Usuario eliminado correctamente.");
                    renderizarVista();
                } catch (err) {
                    alert("Error al eliminar: " + err.message);
                }
            }

            function renderizarVista() {
                const vistaContainer = document.getElementById("miembros-vista");
                vistaContainer.innerHTML = "";

                if (vistaActual === "main") {
                    const grid = document.createElement("div");
                    grid.className = "roles-grid";

                    const categorias = [
                        { clave: "estudiante", icono: "👦", label: "Estudiantes" },
                        { clave: "profesor", icono: "👩‍🏫", label: "Profesores" },
                        { clave: "admin", icono: "🛡️", label: "Administradores" },
                        { clave: "director_nucleo", icono: "🏫", label: "Directores de Núcleo" },
                        { clave: "director_regional", icono: "🌎", label: "Directores Regionales" },
                        { clave: "director_nacional", icono: "🇻🇪", label: "Directores Nacionales" },
                        { clave: "owner_supremo", icono: "👑", label: "Owner Supremo" }
                    ];

                    categorias.forEach(cat => {
                        const card = document.createElement("div");
                        card.className = "rol-card";
                        card.innerHTML = `<span class="icono">${cat.icono}</span><h3>${cat.label}</h3>`;
                        card.addEventListener("click", () => {
                            vistaActual = cat.clave;
                            renderizarVista();
                        });
                        grid.appendChild(card);
                    });

                    vistaContainer.appendChild(grid);
                } else {
                    const backBtn = document.createElement("button");
                    backBtn.className = "back-link";
                    backBtn.innerHTML = "&larr; Volver";
                    backBtn.addEventListener("click", () => { vistaActual = "main"; renderizarVista(); });
                    vistaContainer.appendChild(backBtn);

                    const titulo = document.createElement("h3");
                    titulo.style.color = "var(--color-primario)";
                    titulo.textContent = vistaActual.charAt(0).toUpperCase() + vistaActual.slice(1);
                    vistaContainer.appendChild(titulo);

                    const gridMiembros = document.createElement("div");
                    gridMiembros.className = "miembros-grid";

                    cargarMiembros(vistaActual).then(miembros => {
                        miembros.forEach(persona => {
                            const card = document.createElement("div");
                            card.className = "persona-card";
                            card.innerHTML = `
                                <div class="avatar">${persona.nombre?.charAt(0) || "?"}</div>
                                <strong>${persona.nombre || "Sin nombre"}</strong>
                                <p style="color:var(--color-texto-claro); font-size:0.85rem;">${persona.email || ""}</p>
                                <p style="color:var(--color-texto-claro); font-size:0.8rem;">${persona.agrupacion || "Sin agrupación"}</p>
                            `;

                            if (container.classList.contains("is-admin")) {
                                const btnEliminar = document.createElement("button");
                                btnEliminar.className = "btn-admin-accion";
                                btnEliminar.innerHTML = "✖";
                                btnEliminar.addEventListener("click", (e) => {
                                    e.stopPropagation();
                                    eliminarMiembro(persona.id);
                                });
                                card.appendChild(btnEliminar);
                            }

                            gridMiembros.appendChild(card);
                        });
                        vistaContainer.appendChild(gridMiembros);
                    });
                }
            }

            document.getElementById("btn-guardar-persona").addEventListener("click", async () => {
                if (!window.Auth.checkPermission("manage_users")) {
                    alert("No tienes permiso para crear usuarios.");
                    return;
                }

                const email = document.getElementById("persona-email").value.trim();
                const nombre = document.getElementById("persona-nombre").value.trim();
                const rango = document.getElementById("persona-rango").value;
                const agrupacion = document.getElementById("persona-agrupacion").value.trim();
                const estado = document.getElementById("persona-estado").value.trim();
                const nucleo = document.getElementById("persona-nucleo").value.trim();

                if (!email || !nombre) return alert("Nombre y email son obligatorios.");

                try {
                    const metodos = await fetchSignInMethodsForEmail(auth, email);
                    if (metodos.length > 0) {
                        alert("Este correo ya está registrado en el sistema.");
                        return;
                    }

                    const resultado = await Auth.registerUser(email, nombre, rango, agrupacion, estado, nucleo);
                    if (resultado.success) {
                        alert(`Usuario creado. Contraseña temporal: ${resultado.clave}`);
                        document.getElementById("modal-persona").style.display = "none";
                        renderizarVista();
                    } else {
                        alert("Error: " + resultado.error);
                    }
                } catch (err) {
                    alert("Error al validar el correo: " + err.message);
                }
            });

            document.getElementById("btn-cerrar-modal-persona").addEventListener("click", () => {
                document.getElementById("modal-persona").style.display = "none";
            });

            // Usar el evento auth-ready para iniciar la UI sin race conditions
            window.addEventListener("auth-ready", () => {
                UI.render();
                renderizarVista();
            });

            // Si el evento ya se disparó antes de que este listener se registrara, cargamos directamente
            if (window.Auth.getSession()) {
                UI.render();
                renderizarVista();
            }
        }

        initMiembros();
    </script>
</body>
</html>
