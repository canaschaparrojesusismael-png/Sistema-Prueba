<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miembros – Sistema de Orquestas</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .back-link { display:inline-block; margin:1.5rem 0; color:var(--color-primario); font-weight:600; text-decoration:none; }
        .roles-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:20px; margin-top:20px; }
        .rol-card { background:var(--color-blanco); border:2px solid #e0e4f0; border-radius:var(--border-radius); padding:2rem 1.5rem; text-align:center; cursor:pointer; transition:var(--transition-normal); box-shadow:var(--shadow-card); display:flex; flex-direction:column; align-items:center; gap:0.5rem; }
        .rol-card:hover { border-color:var(--color-primario); transform:translateY(-4px); box-shadow:var(--shadow-hover); }
        .rol-card .icono { font-size:2.5rem; }
        .miembros-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; margin-top:20px; }
        .persona-card { background:var(--color-blanco); border:1px solid #e0e4f0; border-radius:var(--border-radius); padding:1.5rem; text-align:center; box-shadow:var(--shadow-card); position:relative; transition:var(--transition-fast); }
        .persona-card:hover { box-shadow:var(--shadow-hover); transform:translateY(-2px); }
        .avatar { width:64px; height:64px; background:var(--color-primario); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.5rem; margin:0 auto 0.8rem; }
        .is-admin .btn-admin-accion { display:inline-flex; align-items:center; justify-content:center; }
        .btn-admin-accion { display:none; position:absolute; top:-10px; right:-10px; background:var(--color-acento); color:white; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-weight:bold; font-size:0.9rem; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
        .btn-admin-accion:hover { background:#d40404; transform:scale(1.1); }
        .spinner { display:flex; justify-content:center; padding:2rem; }
        .spinner::after { content:""; width:40px; height:40px; border:4px solid #e0e4f0; border-top-color:var(--color-primario); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <header class="barra-superior"><img src="datos.png" alt="Gobierno de Venezuela" style="max-height:50px;"><nav id="user-nav" class="user-nav"></nav></header>
    <main class="contenido-web container" id="miembros-container">
        <a class="back-link" href="panel.html">&larr; Volver al Panel</a>
        <h2 class="titulo-pagina">Miembros</h2>
        <div id="miembros-vista"></div>
    </main>
    <div class="modal-overlay" id="modal-persona"><div class="modal-content">
        <button class="modal-close-btn" id="persona-close-btn">&times;</button>
        <h2>Agregar Persona</h2>
        <div class="editor-row"><label>Nombre:</label><input type="text" id="persona-nombre" class="modal-input"></div>
        <div class="editor-row"><label>Email:</label><input type="email" id="persona-email" class="modal-input"></div>
        <div class="editor-row"><label>Rol:</label><select id="persona-rango" class="modal-input"><option value="estudiante">Estudiante</option><option value="profesor">Profesor</option><option value="admin">Administrador</option><option value="director_nucleo">Director de Núcleo</option></select></div>
        <div class="editor-row"><label>Agrupación:</label><input type="text" id="persona-agrupacion" class="modal-input"></div>
        <div class="editor-row"><label>Estado:</label><select id="persona-estado" class="modal-input"><option value="">Seleccione...</option><option value="Táchira">Táchira</option><option value="Mérida">Mérida</option><option value="Zulia">Zulia</option></select></div>
        <div class="editor-row"><label>Núcleo:</label><select id="persona-nucleo" class="modal-input"><option value="">Seleccione...</option><option value="Puente Real">Puente Real</option><option value="CMA María Auxiliadora">CMA María Auxiliadora</option><option value="San Cristóbal Centro">San Cristóbal Centro</option></select></div>
        <button id="btn-guardar-persona" class="btn btn-submit">Guardar</button>
        <button id="btn-cerrar-modal-persona" class="btn btn-cerrar">Cancelar</button>
    </div></div>

    <script type="module" src="auth.js?v=3.0"></script>
    <script type="module" src="ui-manager.js?v=3.0"></script>
    <script type="module">
        import { db, auth } from "./firebase-init.js";
        import { collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        function cerrarModal(id) { document.getElementById(id).style.display = "none"; }

        function initMiembros() {
            if (!window.Auth?.getSession()) { window.location.href = "index.html"; return; }
            const container = document.getElementById("miembros-container");
            const session = window.Auth.getSession();
            if (window.Auth.checkPermission("manage_users")) container.classList.add("is-admin");
            let vistaActual = "main";

            async function cargarMiembros(rango) {
                if (!window.Auth.checkPermission("manage_users")) return [];
                let q;
                if (["owner_supremo","director_nacional"].includes(session.role)) {
                    q = query(collection(db, "usuarios"), where("rango", "==", rango));
                } else {
                    q = query(collection(db, "usuarios"), where("rango", "==", rango), where("nucleo", "==", session.nucleus));
                }
                const snap = await getDocs(q);
                return snap.docs.map(d => ({ id: d.id, ...d.data() }));
            }

            async function eliminarMiembro(uid, targetRole) {
                if (!window.Auth.canEdit(targetRole)) { window._showToast("No tienes permiso para eliminar a este usuario.", "error"); return; }
                if (!confirm("¿Eliminar a este usuario?")) return;
                try { await deleteDoc(doc(db, "usuarios", uid)); window._showToast("Usuario eliminado.", "success"); renderizarVista(); }
                catch (err) { window._showToast("Error: " + err.message, "error"); }
            }

            function renderizarVista() {
                const vc = document.getElementById("miembros-vista"); vc.innerHTML = "";
                if (vistaActual === "main") {
                    const grid = document.createElement("div"); grid.className = "roles-grid";
                    const categorias = [
                        { clave:"estudiante", icono:"👦", label:"Estudiantes" },
                        { clave:"profesor", icono:"👩‍🏫", label:"Profesores" },
                        { clave:"admin", icono:"🛡️", label:"Administradores" },
                        { clave:"director_nucleo", icono:"🏫", label:"Directores de Núcleo" },
                        { clave:"director_regional", icono:"🌎", label:"Directores Regionales" },
                        { clave:"director_nacional", icono:"🇻🇪", label:"Directores Nacionales" },
                        { clave:"owner_supremo", icono:"👑", label:"Owner Supremo" }
                    ];
                    categorias.forEach(cat => {
                        if (!window.Auth.canView(cat.clave)) return;
                        const card = document.createElement("div"); card.className = "rol-card";
                        card.innerHTML = `<span class="icono">${cat.icono}</span><h3>${cat.label}</h3>`;
                        card.addEventListener("click", () => { vistaActual = cat.clave; renderizarVista(); });
                        grid.appendChild(card);
                    });
                    vc.appendChild(grid);
                } else {
                    const back = document.createElement("button"); back.className = "back-link"; back.innerHTML = "&larr; Volver";
                    back.addEventListener("click", () => { vistaActual = "main"; renderizarVista(); }); vc.appendChild(back);
                    const titulo = document.createElement("h3"); titulo.className = "titulo-pagina"; titulo.textContent = vistaActual; vc.appendChild(titulo);
                    const gridM = document.createElement("div"); gridM.className = "miembros-grid";
                    // Spinner de carga
                    const spinner = document.createElement("div"); spinner.className = "spinner"; vc.appendChild(spinner);
                    cargarMiembros(vistaActual).then(miembros => {
                        spinner.remove();
                        miembros.forEach(p => {
                            const card = document.createElement("div"); card.className = "persona-card";
                            card.innerHTML = `<div class="avatar">${p.nombre?.charAt(0)||"?"}</div><strong>${p.nombre||"Sin nombre"}</strong><p class="email-miembro">${p.email||""}</p><p class="agrupacion-miembro">${p.agrupacion||"Sin agrupación"}</p>`;
                            if (window.Auth.canEdit(vistaActual)) {
                                const btnDel = document.createElement("button"); btnDel.className = "btn-admin-accion"; btnDel.innerHTML = "✖";
                                btnDel.addEventListener("click", (e) => { e.stopPropagation(); eliminarMiembro(p.id, vistaActual); });
                                card.appendChild(btnDel);
                            }
                            gridM.appendChild(card);
                        });
                        vc.appendChild(gridM);
                    });
                }
            }

            document.getElementById("btn-guardar-persona").addEventListener("click", async () => {
                if (!window.Auth.checkPermission("manage_users")) { window._showToast("No tienes permiso.", "error"); return; }
                const email = document.getElementById("persona-email").value.trim();
                const nombre = document.getElementById("persona-nombre").value.trim();
                const rango = document.getElementById("persona-rango").value;
                const agrup = document.getElementById("persona-agrupacion").value.trim();
                const estado = document.getElementById("persona-estado").value;
                const nucleo = document.getElementById("persona-nucleo").value;
                if (!email || !nombre) { window._showToast("Nombre y email obligatorios.", "error"); return; }
                if (!window.Auth.canEdit(rango)) { window._showToast("No puedes crear un usuario con ese rol.", "error"); return; }
                try {
                    const metodos = await fetchSignInMethodsForEmail(auth, email);
                    if (metodos.length > 0) { window._showToast("El correo ya existe.", "error"); return; }
                    const res = await Auth.registerUser(email, nombre, rango, agrup, estado, nucleo);
                    if (res.success) { window._showToast(`Usuario creado. Contraseña: ${res.clave}`, "success"); cerrarModal("modal-persona"); renderizarVista(); }
                    else window._showToast("Error: " + res.error, "error");
                } catch (err) { window._showToast("Error: " + err.message, "error"); }
            });

            document.getElementById("btn-cerrar-modal-persona").addEventListener("click", () => cerrarModal("modal-persona"));
            document.getElementById("persona-close-btn").addEventListener("click", () => cerrarModal("modal-persona"));

            window.addEventListener("auth-ready", () => { UI.render(); renderizarVista(); });
            if (window.Auth?.getSession()) { UI.render(); renderizarVista(); }
        }
        initMiembros();
    </script>
</body>
</html>
