<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Cambiar Contraseña – Sistema de Orquestas</title>
    <link rel="stylesheet" href="style.css?v=2.2">
    <style>
        .cambio-wrapper {
            max-width: 400px; margin: 100px auto; background: white;
            padding: 2rem; border-radius: var(--border-radius);
            box-shadow: var(--shadow-card); text-align: center;
        }
        .cambio-wrapper h2 { color: var(--color-primario); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <main class="cambio-wrapper">
        <h2>Cambio de Contraseña Obligatorio</h2>
        <p style="margin-bottom:1.5rem;">Por seguridad, debes cambiar tu contraseña antes de continuar.</p>
        <form id="form-cambio" novalidate>
            <div class="input-group">
                <label for="nueva">Nueva contraseña</label>
                <input type="password" id="nueva" required minlength="8" />
            </div>
            <div class="input-group">
                <label for="confirmar">Confirmar contraseña</label>
                <input type="password" id="confirmar" required minlength="8" />
            </div>
            <button type="submit" class="btn-submit">Cambiar Contraseña</button>
        </form>
    </main>

    <script type="module" src="auth.js?v=2.2"></script>
    <script type="module">
        import { auth, db } from "./firebase-init.js";
        import { updatePassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const uid = sessionStorage.getItem("pendingPasswordChange");
        if (!uid) window.location.href = "index.html";

        onAuthStateChanged(auth, (user) => {
            if (!user || user.uid !== uid) {
                window.location.href = "login.html";
                return;
            }
        });

        document.getElementById("form-cambio").addEventListener("submit", async (e) => {
            e.preventDefault();
            const nueva = document.getElementById("nueva").value;
            const confirmar = document.getElementById("confirmar").value;
            if (nueva !== confirmar) { alert("Las contraseñas no coinciden."); return; }
            if (nueva.length < 8) { alert("La contraseña debe tener al menos 8 caracteres."); return; }

            try {
                const user = auth.currentUser;
                if (!user) throw new Error("No hay sesión activa.");
                await updatePassword(user, nueva);
                await updateDoc(doc(db, "usuarios", uid), { requiresPasswordChange: false });
                sessionStorage.removeItem("pendingPasswordChange");
                alert("Contraseña cambiada correctamente. Ahora inicia sesión.");
                await signOut(auth);
                window.location.href = "login.html";
            } catch (err) {
                alert("Error: " + err.message);
            }
        });
    </script>
</body>
</html>
