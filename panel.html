<html lang="es">
<head>
<script>
  if (!sessionStorage.getItem("sistemaOrquestas_session") && !localStorage.getItem("sistemaOrquestas_session")) {
    window.location.href = "login.html";
  }

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel – Sistema de Orquestas</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .flyer-card {
            width: 220px;
            height: 150px;
            object-fit: cover;
            border-radius: var(--border-radius-sm);
            border: 2px solid transparent;
            box-shadow: var(--shadow-card);
            transition: var(--transition-normal);
        }
        .flyer-card:hover {
            border-color: var(--color-primario);
            box-shadow: var(--shadow-hover);
        }
        .carrusel-flyers {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--color-blanco);
            padding: 20px;
            margin: 20px 0;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-card);
            gap: 10px;
            position: relative;
        }
        .flyers-viewport {
            display: flex;
            gap: 20px;
            flex-grow: 1;
            justify-content: center;
            overflow: hidden;
        }
        .flecha-btn {
            background: var(--color-primario);
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 5px;
            transition: var(--transition-fast);
        }
        .flecha-btn:hover { background: var(--color-primario-oscuro); }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 25px;
            margin-bottom: 40px;
        }
        .calendario-container {
            background: var(--color-blanco);
            border: 1px solid #e0e4f0;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow-card);
            position: relative;
            margin-top: 50px;
            overflow: visible;
        }
        .calendario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calendario-header button {
            background: var(--color-primario);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .calendario-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .dia-semana {
            font-weight: bold;
            color: var(--color-texto);
            padding: 10px 0;
            background: #f4f5f9;
            border-radius: 4px;
        }
        .dia-numero {
            padding: 12px 0;
            border: 1px solid #e0e4f0;
            border-radius: 4px;
            min-height: 70px;
            cursor: pointer;
            transition: var(--transition-fast);
            font-size: 0.9rem;
            position: relative;
        }
        .dia-numero:hover { background: var(--color-primario); color: white; }
        .dia-numero.otro-mes { color: #ccc; }
        .evento {
            font-size: 0.7rem;
            padding: 2px 4px;
            border-radius: 4px;
            margin-top: 4px;
            display: block;
            cursor: pointer;
        }
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .dropdown-btn {
            width: 100%;
            padding: 15px;
            background: var(--color-blanco);
            border: 1px solid #e0e4f0;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-texto);
            cursor: pointer;
            text-align: left;
            box-shadow: var(--shadow-card);
            transition: var(--transition-normal);
            text-decoration: none;
            display: block;
        }
        .dropdown-btn:hover { border-color: var(--color-primario); transform: translateY(-2px); }
        .form-control { width: 100%; padding: 0.4rem; margin-top: 0.2rem; }
        .modal-content textarea.form-control { resize: vertical; }
        #admin-controls { display: flex; gap: 10px; margin-top: 15px; }
        #event-group-row, #event-photo-row, #event-color-row { display: none; }
        #event-photo-preview {
            max-width: 100%;
            max-height: 150px;
            margin-top: 10px;
            display: none;
            border-radius: 8px;
        }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>

                <button id="save-event-btn" class="btn btn-submit">Guardar</button>

    <script type="module" src="auth.js?v=2.2"></script>
    <script type="module" src="ui-manager.js?v=2.2"></script>
    <script type="module">
        import { db } from "./firebase-init.js";
        import { 
            collection, onSnapshot, getDocs, doc, writeBatch, addDoc, updateDoc, deleteDoc, query 
        } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // ====================== VARIABLES GLOBALES ======================
        const flyersCol = collection(db, "flyers");
        const eventosCol = collection(db, "eventos");
        let flyerData = [];
        let flyerStartIndex = 0;
        const MAX_VISIBLE = 4;
        let events = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let eventPhotoBase64 = "";

        // ====================== CROP MODAL (compartido) ======================
        let cropCallback = null;
        function abrirCropModal(file, callback) {
            cropCallback = callback;
            const modal = document.getElementById("crop-modal");
            const img = document.getElementById("crop-source");
            const canvas = document.getElementById("crop-canvas");
            const ctx = canvas.getContext("2d");
            const reader = new FileReader();
            reader.onload = function (e) {
                img.src = e.target.result;
                img.onload = function () {
                    const cropArea = document.getElementById("crop-area");
                    const naturalW = img.naturalWidth, naturalH = img.naturalHeight;
                    const displayW = img.width, displayH = img.height;
                    let cropW = Math.min(displayW, displayH * (16/9));
                    let cropH = cropW * (9/16);
                    let cropX = (displayW - cropW) / 2, cropY = (displayH - cropH) / 2;
                    function update() {
                        cropArea.style.left = cropX + "px";
                        cropArea.style.top = cropY + "px";
                        cropArea.style.width = cropW + "px";
                        cropArea.style.height = cropH + "px";
                    }
                    update();
                    let dragging = false, startX, startY, sLeft, sTop, sW, sH;
                    const handle = cropArea.querySelector(".resize-handle");
                    function down(e) {
                        e.preventDefault(); dragging = true;
                        startX = e.clientX; startY = e.clientY;
                        sLeft = cropX; sTop = cropY; sW = cropW; sH = cropH;
                        document.addEventListener("pointermove", move);
                        document.addEventListener("pointerup", up);
                    }
                    function move(e) {
                        if (!dragging) return;
                        const dx = e.clientX - startX, dy = e.clientY - startY;
                        if (e.target === handle) {
                            let nW = sW + dx; if (nW < 50) nW = 50;
                            if (cropX + nW > displayW) nW = displayW - cropX;
                            if (cropY + nW*(9/16) > displayH) { nW = (displayH - cropY) * (16/9); }
                            cropW = nW; cropH = cropW * (9/16);
                        } else {
                            cropX = Math.max(0, Math.min(sLeft + dx, displayW - cropW));
                            cropY = Math.max(0, Math.min(sTop + dy, displayH - cropH));
                        }
                        update();
                    }
                    function up() { dragging = false; document.removeEventListener("pointermove", move); document.removeEventListener("pointerup", up); }
                    cropArea.addEventListener("pointerdown", down);
                    handle.addEventListener("pointerdown", down);
                    document.getElementById("crop-confirm").onclick = () => {
                        const sx = cropX * (naturalW / displayW), sy = cropY * (naturalH / displayH);
                        const sw = cropW * (naturalW / displayW), sh = cropH * (naturalH / displayH);
                        canvas.width = sw; canvas.height = sh;
                        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
                        modal.style.display = "none";
                        cropCallback(canvas.toDataURL("image/jpeg", 0.6));
                    };
                    document.getElementById("crop-cancel").onclick = () => { modal.style.display = "none"; cropCallback(null); };
                    document.getElementById("crop-close-btn").onclick = () => { modal.style.display = "none"; cropCallback(null); };
                    modal.style.display = "flex";
                };
            };
            reader.readAsDataURL(file);
        }

        // ====================== FLYERS (Reactivo con Firestore) ======================
        function renderFlyers() {
            const container = document.getElementById("flyers-viewport");
            const visible = flyerData.slice(flyerStartIndex, flyerStartIndex + MAX_VISIBLE);
            container.innerHTML = visible.map(f => `<img class="flyer-card" src="${f.url}" alt="${f.alt}" title="${f.text}" />`).join("");
        }

        const unsubscribeFlyers = onSnapshot(flyersCol, (snapshot) => {
            flyerData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            // 🔧 Orden forzado según el campo 'orden'
            flyerData.sort((a, b) => (a.orden || 0) - (b.orden || 0));
            if (flyerStartIndex >= flyerData.length) flyerStartIndex = 0;
            renderFlyers();
        });

        document.getElementById("prev-flyer").addEventListener("click", () => {
            if (flyerData.length <= MAX_VISIBLE) return;
            flyerStartIndex = (flyerStartIndex - 1 + flyerData.length) % flyerData.length;
            renderFlyers();
        });
        document.getElementById("next-flyer").addEventListener("click", () => {
            if (flyerData.length <= MAX_VISIBLE) return;
            flyerStartIndex = (flyerStartIndex + 1) % flyerData.length;
            renderFlyers();
        });

        // Modal de gestión de flyers
        let workingFlyers = [];
        function abrirFlyerModal() {
            workingFlyers = flyerData.map(f => ({ ...f })); // copia con id, url, alt, text, orden
            const modal = document.getElementById("flyer-modal");
            const container = document.getElementById("flyer-items");
            
            function renderFlyerItems() {
                container.innerHTML = workingFlyers.map((f, i) => `<div class="carousel-item-editor">
                    <div class="editor-row"><label>URL o archivo:</label>
                        <input type="text" class="f-url" value="${f.url}" data-index="${i}" />
                        <span>o</span>
                        <input type="file" class="f-file" accept="image/*" data-index="${i}" />
                    </div>
                    <div class="editor-row"><label>Alt:</label><input type="text" class="f-alt" value="${f.alt}" /></div>
                    <div class="editor-row"><label>Texto:</label><input type="text" class="f-text" value="${f.text}" /></div>
                    <button class="btn btn-cerrar eliminar-flyer" data-index="${i}">Eliminar</button>
                </div>`).join("");

                container.querySelectorAll(".f-file").forEach(inp => inp.addEventListener("change", function(e) {
                    const idx = parseInt(this.dataset.index);
                    const file = e.target.files[0];
                    if (!file) return;
                    abrirCropModal(file, (croppedDataUrl) => {
                        if (croppedDataUrl) {
                            const urlInput = container.querySelector(`.f-url[data-index="${idx}"]`);
                            if (urlInput) urlInput.value = croppedDataUrl;
                            if (workingFlyers[idx]) workingFlyers[idx].url = croppedDataUrl;
                        }
                        e.target.value = "";
                    });
                }));

                container.querySelectorAll(".eliminar-flyer").forEach(btn => btn.addEventListener("click", () => {
                    workingFlyers.splice(parseInt(btn.dataset.index), 1);
                    renderFlyerItems();
                }));
            }

            renderFlyerItems();
            modal.style.display = "flex";

            // Guardar cambios en Firestore (reemplaza todos)
            document.getElementById("save-flyers-btn").onclick = async () => {
                // Sincronizar los valores actuales del formulario
                const filas = document.querySelectorAll(".carousel-item-editor");
                workingFlyers = [...filas].map(fila => ({
                    url: fila.querySelector(".f-url")?.value || "",
                    alt: fila.querySelector(".f-alt")?.value || "",
                    text: fila.querySelector(".f-text")?.value || ""
                }));
                await guardarFlyersEnFirestore(workingFlyers);
                modal.style.display = "none";
            };
            document.getElementById("add-flyer-btn").onclick = () => { workingFlyers.push({ url: "", alt: "", text: "" }); renderFlyerItems(); };
            document.getElementById("close-flyer-modal").onclick = () => modal.style.display = "none";
            document.getElementById("flyer-close-btn").onclick = () => modal.style.display = "none";
        }

        async function guardarFlyersEnFirestore(nuevosDatos) {
            const snapshot = await getDocs(flyersCol);
            const batch = writeBatch(db);
            snapshot.docs.forEach(d => batch.delete(doc(db, "flyers", d.id)));
            nuevosDatos.forEach((item, idx) => {
                const nuevoDoc = doc(flyersCol);
                batch.set(nuevoDoc, { url: item.url, alt: item.alt, text: item.text, orden: idx });
            });
            await batch.commit();
        }

        document.getElementById("edit-flyers-btn").addEventListener("click", abrirFlyerModal);

        // ====================== CALENDARIO DE EVENTOS (Reactivo) ======================
        function renderCalendar() {
            const session = window.Auth?.getSession(); // uso seguro con window
            const grid = document.getElementById("calendario-grid");
            const title = document.getElementById("month-year");
            const months = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
            
            // Limpiar días anteriores
            grid.querySelectorAll(".dia-numero").forEach(d => d.remove());
            
            title.textContent = `${months[currentMonth]} ${currentYear}`;

            const firstDay = new Date(currentYear, currentMonth, 1).getDay() || 7;
            const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();

            let eventosVisibles;
            if (session && window.Auth?.checkPermission && window.Auth.checkPermission("manage_users")) {
                eventosVisibles = events;
            } else {
                // Filtrar eventos según el grupo/rol del usuario
                const rolNormalizado = session?.role === "estudiante" ? ["Estudiantes", "Estudiante"] :
                                     session?.role === "profesor" ? ["Profesores", "Profesor"] :
                                     [session?.role];
                const grupoNormalizado = session?.group ? [session.group] : [];
                eventosVisibles = events.filter(ev => {
                    const grupos = ev.groups;
                    return grupos.some(g => g === "todos" || rolNormalizado.includes(g) || grupoNormalizado.includes(g));
                });
            }

            let html = "";
            for (let i = firstDay-1; i > 0; i--) {
                html += `<div class="dia-numero otro-mes">${daysInPrevMonth - i + 1}</div>`;
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEvents = eventosVisibles.filter(ev => ev.date === dateStr);
                let eventoHtml = dayEvents.map(ev => {
                    let icon = ev.photo?.trim() ? `<img src="${ev.photo}" style="width:16px;height:16px;border-radius:50%;vertical-align:middle;" />` :
                        ({"todos":"👥","Profesores":"👩‍🏫","Estudiantes":"👦","Orquesta Infantil":"🎻","Orquesta Juvenil":"🎺"}[ev.groups[0]] || "👥");
                    return `<span class="evento" style="background:${ev.color}" data-eventid="${ev.id}">${icon} ${ev.title}</span>`;
                }).join("");
                html += `<div class="dia-numero" data-date="${dateStr}">${d}${eventoHtml}</div>`;
            }
            const totalCells = firstDay-1 + daysInMonth;
            const nextDays = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= nextDays; i++) {
                html += `<div class="dia-numero otro-mes">${i}</div>`;
            }
            grid.innerHTML += html;
        }

        onSnapshot(eventosCol, (snapshot) => {
            events = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderCalendar();
        });

        // Modal de evento
        document.getElementById("calendario-grid").addEventListener("click", (e) => {
            const eventoEl = e.target.closest(".evento");
            if (eventoEl) {
                const eventId = eventoEl.dataset.eventid;
                const esAdmin = window.Auth?.checkPermission && window.Auth.checkPermission("manage_users");
                abrirModalEvento(eventId, esAdmin);
            }
        });

        function abrirNuevoEvento() { abrirModalEvento(null, true); }

        function abrirModalEvento(eventId, esEdicion) {
            const esAdmin = window.Auth?.checkPermission && window.Auth.checkPermission("manage_users");
            const ev = eventId ? events.find(e => String(e.id) === String(eventId)) : null;

            document.getElementById("event-id").value = eventId || "";
            document.getElementById("event-date").value = ev ? ev.date : "";
            document.getElementById("event-title").value = ev ? ev.title : "";
            document.getElementById("event-time").value = ev ? (ev.time || "") : "";
            document.getElementById("event-location").value = ev ? (ev.location || "") : "";
            document.getElementById("event-photo").value = ev ? (ev.photo || "") : "";
            document.getElementById("event-desc").value = ev ? (ev.desc || "") : "";
            document.getElementById("event-color").value = ev ? (ev.color || "#ffeaa7") : "#ffeaa7";
            document.getElementById("event-photo-file").value = "";
            eventPhotoBase64 = ev ? (ev.photo || "") : "";

            const photoRow = document.getElementById("event-photo-row");
            const colorRow = document.getElementById("event-color-row");
            const groupRow = document.getElementById("event-group-row");
            const preview = document.getElementById("event-photo-preview");

            if (esAdmin && esEdicion) {
                photoRow.style.display = "flex";
                colorRow.style.display = "flex";
                groupRow.style.display = "flex";
            } else {
                photoRow.style.display = "none";
                colorRow.style.display = "none";
                groupRow.style.display = "none";
            }
            if (ev?.photo?.trim()) {
                preview.src = ev.photo;
                preview.style.display = "block";
            } else {
                preview.style.display = "none";
            }

            if (esAdmin && esEdicion) {
                const groupSelect = document.getElementById("event-group");
                [...groupSelect.options].forEach(opt => opt.selected = ev ? ev.groups.includes(opt.value) : false);
            }

            const campos = document.querySelectorAll("#event-modal .form-control");
            const fileInput = document.getElementById("event-photo-file");
            campos.forEach(c => c.disabled = !(esAdmin && esEdicion));
            if (fileInput) fileInput.disabled = !(esAdmin && esEdicion);
            
            document.getElementById("admin-controls").style.display = (esAdmin && esEdicion) ? "flex" : "none";
            document.getElementById("event-modal-title").textContent = ev ? (esAdmin && esEdicion ? "Editar Evento" : "Detalles del Evento") : "Agregar Evento";
            document.getElementById("event-modal").style.display = "flex";
        }

        document.getElementById("event-photo-file").addEventListener("change", function(e) {
            const file = e.target.files[0];
            if (!file) return;
            abrirCropModal(file, (croppedDataUrl) => {
                if (croppedDataUrl) {
                    document.getElementById("event-photo").value = croppedDataUrl;
                    eventPhotoBase64 = croppedDataUrl;
                    document.getElementById("event-photo-preview").src = croppedDataUrl;
                    document.getElementById("event-photo-preview").style.display = "block";
                }
                e.target.value = "";
            });
        });

        document.getElementById("save-event-btn").addEventListener("click", async () => {
            if (!window.Auth?.checkPermission || !window.Auth.checkPermission("manage_users")) return;
            const id = document.getElementById("event-id").value;
            const evento = {
                date: document.getElementById("event-date").value,
                title: document.getElementById("event-title").value,
                time: document.getElementById("event-time").value,
                location: document.getElementById("event-location").value,
                photo: eventPhotoBase64 || document.getElementById("event-photo").value,
                desc: document.getElementById("event-desc").value,
                color: document.getElementById("event-color").value,
                groups: [...document.getElementById("event-group").selectedOptions].map(o => o.value)
            };
            if (!evento.date || !evento.title) { alert("Fecha y título son obligatorios."); return; }
            try {
                if (id) {
                    await updateDoc(doc(eventosCol, id), evento);
                } else {
                    await addDoc(eventosCol, evento);
                }
                document.getElementById("event-modal").style.display = "none";
            } catch (err) { alert("Error: " + err.message); }
        });

        document.getElementById("delete-event-btn").addEventListener("click", async () => {
            if (!window.Auth?.checkPermission || !window.Auth.checkPermission("manage_users")) return;
            const id = document.getElementById("event-id").value;
            if (!id) return;
            if (confirm("¿Eliminar evento?")) {
                try {
                    await deleteDoc(doc(eventosCol, id));
                    document.getElementById("event-modal").style.display = "none";
                } catch (err) { alert("Error: " + err.message); }
            }
        });

        document.getElementById("close-event-modal").addEventListener("click", () => document.getElementById("event-modal").style.display = "none");
        document.getElementById("event-close-btn").addEventListener("click", () => document.getElementById("event-modal").style.display = "none");

        document.getElementById("prev-month").addEventListener("click", () => {
            if (currentMonth === 0) { currentMonth = 11; currentYear--; }
            else currentMonth--;
            renderCalendar();
        });
        document.getElementById("next-month").addEventListener("click", () => {
            if (currentMonth === 11) { currentMonth = 0; currentYear++; }
            else currentMonth++;
            renderCalendar();
        });

        document.getElementById("edit-calendar-btn").addEventListener("click", abrirNuevoEvento);

        // ====================== MIGRACIÓN DE DATOS ANTIGUOS (localStorage → Firestore) ======================
        (async function migrar() {
            try {
                // Migrar flyers
                const oldFlyers = localStorage.getItem("sistemaOrquestas_flyers");
                if (oldFlyers) {
                    const flyersArray = JSON.parse(oldFlyers);
                    const snap = await getDocs(flyersCol);
                    if (snap.empty) {
                        const batch = writeBatch(db);
                        flyersArray.forEach((f, i) => {
                            const newDoc = doc(flyersCol);
                            batch.set(newDoc, { url: f.src || "", alt: f.alt || "", text: f.text || "", orden: i });
                        });
                        await batch.commit();
                    }
                    localStorage.removeItem("sistemaOrquestas_flyers");
                }

                // Migrar eventos
                const oldEvents = localStorage.getItem("sistemaOrquestas_events");
                if (oldEvents) {
                    const eventsArray = JSON.parse(oldEvents);
                    const snap = await getDocs(eventosCol);
                    if (snap.empty) {
                        const batch = writeBatch(db);
                        eventsArray.forEach(ev => {
                            const newDoc = doc(eventosCol);
                            batch.set(newDoc, ev); // preserva la estructura antigua
                        });
                        await batch.commit();
                    }
                    localStorage.removeItem("sistemaOrquestas_events");
                }
            } catch (error) { console.warn("Migración omitida:", error); }
        })();

        // ====================== INICIALIZACIÓN FINAL (corrección de carrera) ======================
        if (window.UI?.render) {
            window.UI.render();
        }

        setTimeout(() => {
            if (window.Auth?.checkPermission && window.Auth.checkPermission("edit_carousel")) {
                const btnFlyers = document.getElementById("edit-flyers-btn");
                const btnCalendar = document.getElementById("edit-calendar-btn");
                if (btnFlyers) btnFlyers.style.display = "block";
                if (btnCalendar) btnCalendar.style.display = "block";
            }
        }, 0);
    </script>
</body>
