<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formación – Sistema de Orquestas</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        :root {
            --color-primario: #1a237e;
            --color-secundario: #4a148c;
            --border-radius: 16px;
            --shadow-soft: 0 10px 20px rgba(0,0,0,0.08);
        }
        .back-link { display: inline-block; margin: 1.5rem 0; color: var(--color-primario); font-weight: 600; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }

        .formacion-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-top: 20px; }
        @media (max-width: 768px) { .formacion-layout { grid-template-columns: 1fr; } }

        .seccion {
            background: white; border: 1px solid #e0e4f0; border-radius: var(--border-radius);
            padding: 25px; box-shadow: var(--shadow-soft); margin-bottom: 25px;
        }
        .seccion h2 { color: var(--color-primario); margin-bottom: 20px; border-bottom: 2px solid #e0e4f0; padding-bottom: 10px; }

        .grid-modulos { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .btn-modulo {
            padding: 20px; background: linear-gradient(135deg, #ffffff, #f9faff); border: 2px solid var(--color-primario);
            border-radius: var(--border-radius); font-weight: 700; color: var(--color-primario); cursor: pointer;
            transition: all 0.3s ease; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .btn-modulo:hover { background: var(--color-primario); color: white; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(26,35,126,0.2); }
        .btn-modulo .icono { font-size: 2rem; }

        .btn-admin-accion {
            display: none; padding: 8px 16px; background: var(--color-primario); color: white; border: none;
            border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 0.8rem; margin-top: 5px;
        }
        .is-admin .btn-admin-accion { display: inline-block; }

        .chat-container { display: flex; flex-direction: column; height: 500px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; background: #f9faff; border-radius: 12px; margin-bottom: 15px; }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 10px; border: 1.5px solid #e0e4f0; border-radius: 25px; font-size: 0.9rem; }
        .btn-enviar { background: var(--color-primario); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <header class="barra-superior">
        <img src="datos.png" alt="Gobierno de Venezuela" style="max-height:50px;" />
        <nav id="user-nav" class="user-nav"></nav>
    </header>

    <main class="contenido-web container" id="formacion-container">
        <a class="back-link" href="panel.html">&larr; Volver al Panel</a>
        <h2 style="color: var(--color-primario); font-weight: 800;">Formación</h2>

        <div class="formacion-layout">
            <div>
                <section class="seccion" id="seccion-conceptos">
                    <h2>Conceptos básicos</h2>
                    <div class="grid-modulos" id="grid-conceptos"></div>
                </section>
                <section class="seccion" id="seccion-libros">
                    <h2>Libros</h2>
                    <div class="grid-modulos" id="grid-libros"></div>
                </section>
            </div>

            <aside class="seccion">
                <h2>Chat IA</h2>
                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages"><p style="color:#666;">¿En qué puedo ayudarte hoy?</p></div>
                    <div class="chat-input-area">
                        <input type="text" class="chat-input" id="chat-input" placeholder="Escribe tu duda..." />
                        <button class="btn-enviar" id="btn-enviar-chat">➤</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <div class="modal-overlay" id="modal-modulo">
        <div class="modal-content">
            <h2 id="modal-modulo-title">Nuevo Módulo</h2>
            <input type="hidden" id="modulo-seccion" />
            <div class="editor-row"><label>Nombre:</label><input type="text" id="modulo-nombre" class="modal-input" /></div>
            <div class="editor-row"><label>Icono (emoji):</label><input type="text" id="modulo-icono" class="modal-input" placeholder="🎵" /></div>
            <button id="btn-guardar-modulo" class="btn btn-submit">Guardar</button>
            <button id="btn-cerrar-modal-modulo" class="btn btn-cerrar">Cancelar</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="ui-manager.js"></script>
    <script>
        (function() { if (!Auth.getSession()) window.location.href = "index.html"; })();

        const STORAGE_FORMACION = "sistemaOrquestas_formacion";
        let dataFormacion = JSON.parse(localStorage.getItem(STORAGE_FORMACION)) || {
            conceptos: [
                { id: "1", nombre: "Partitura", icono: "🎼" },
                { id: "2", nombre: "Figuras", icono: "🎵" },
                { id: "3", nombre: "Ritmo", icono: "🥁" },
                { id: "4", nombre: "Tonalidad", icono: "🎹" }
            ],
            libros: [
                { id: "5", nombre: "Solfeo", icono: "📖" },
                { id: "6", nombre: "Resúmenes", icono: "📝" },
                { id: "7", nombre: "Teoría", icono: "📚" }
            ]
        };

        function guardarFormacion() { localStorage.setItem(STORAGE_FORMACION, JSON.stringify(dataFormacion)); }

        function renderizarModulos(seccion, gridId) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = "";
            const modulos = dataFormacion[seccion];

            modulos.forEach(mod => {
                const btn = document.createElement("button");
                btn.className = "btn-modulo";
                btn.innerHTML = `<span class="icono">${mod.icono}</span> ${mod.nombre}`;
                btn.addEventListener("click", () => alert(`Abriendo módulo: ${mod.nombre}`));

                const btnAdmin = document.createElement("button");
                btnAdmin.className = "btn-admin-accion";
                btnAdmin.textContent = "✖ Eliminar";
                btnAdmin.addEventListener("click", (e) => {
                    e.stopPropagation();
                    if (confirm(`¿Eliminar "${mod.nombre}"?`)) {
                        dataFormacion[seccion] = dataFormacion[seccion].filter(m => m.id !== mod.id);
                        guardarFormacion();
                        renderizarModulos(seccion, gridId);
                    }
                });
                btn.appendChild(btnAdmin);
                grid.appendChild(btn);
            });

            const btnAgregar = document.createElement("button");
            btnAgregar.className = "btn-modulo";
            btnAgregar.style.borderStyle = "dashed";
            btnAgregar.innerHTML = `<span class="icono">+</span> Agregar`;
            btnAgregar.addEventListener("click", () => {
                document.getElementById("modulo-seccion").value = seccion;
                document.getElementById("modulo-nombre").value = "";
                document.getElementById("modulo-icono").value = "";
                document.getElementById("modal-modulo").style.display = "flex";
            });
            grid.appendChild(btnAgregar);
        }

        document.getElementById("btn-guardar-modulo").addEventListener("click", () => {
            const seccion = document.getElementById("modulo-seccion").value;
            const nombre = document.getElementById("modulo-nombre").value.trim();
            const icono = document.getElementById("modulo-icono").value.trim() || "📄";
            if (!nombre) return alert("Nombre obligatorio.");
            dataFormacion[seccion].push({ id: Date.now().toString(36), nombre, icono });
            guardarFormacion();
            renderizarModulos(seccion, seccion === "conceptos" ? "grid-conceptos" : "grid-libros");
            document.getElementById("modal-modulo").style.display = "none";
        });

        document.getElementById("btn-cerrar-modal-modulo").addEventListener("click", () => {
            document.getElementById("modal-modulo").style.display = "none";
        });

        document.getElementById("btn-enviar-chat").addEventListener("click", () => {
            const input = document.getElementById("chat-input");
            const msg = input.value.trim();
            if (!msg) return;
            const chatMessages = document.getElementById("chat-messages");
            chatMessages.innerHTML += `<p><strong>Tú:</strong> ${msg}</p>`;
            chatMessages.innerHTML += `<p><strong>IA:</strong> (Respuesta simulada)</p>`;
            input.value = "";
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        window.addEventListener("DOMContentLoaded", () => {
            UI.render();
            renderizarModulos("conceptos", "grid-conceptos");
            renderizarModulos("libros", "grid-libros");

            const session = Auth.getSession();
            if (session && (session.role === "Administrativo" || session.role === "Profesor")) {
                document.getElementById("formacion-container").classList.add("is-admin");
            }
        });
    </script>
</body>
</html>
